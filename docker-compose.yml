services:
  db:
    image: postgres:16-alpine

    container_name: techassessment_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techassessment

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    container_name: techassessment_backend

    restart: "no"

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/techassessment
      JWT_SECRET: "key2106"
      JWT_EXPIRES_IN: "1d"

    ports:
      - "3000:3000"

volumes:
  postgres_data: